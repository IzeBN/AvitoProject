# =========================================================
# Redis 7 — конфигурация для AvitoСRM
# =========================================================

bind 0.0.0.0
protected-mode no
port 6379

# Память
maxmemory 512mb
maxmemory-policy allkeys-lru

# AOF персистентность
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots
save 900 1
save 300 10
save 60 10000

rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Производительность
tcp-keepalive 300
hz 15
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Соединения
maxclients 1000
tcp-backlog 511
timeout 0

# Логирование
loglevel notice
logfile ""

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
