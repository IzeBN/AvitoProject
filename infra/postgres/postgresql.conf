# =========================================================
# PostgreSQL 16 — оптимизация под 4GB RAM, 4 CPU, SSD
# Целевая нагрузка: ~500 RPS, мультитенантное приложение
# =========================================================

# ---------------------------------------------------------
# Подключения
# ---------------------------------------------------------
listen_addresses = '*'
max_connections = 200                    # приложение использует pool на 100 соединений
superuser_reserved_connections = 3

# ---------------------------------------------------------
# Память
# ---------------------------------------------------------
shared_buffers = 1GB                     # 25% RAM — основной кэш PostgreSQL
effective_cache_size = 3GB               # 75% RAM — подсказка планировщику
work_mem = 16MB                          # память на операцию сортировки/хеша
                                         # реальный расход: work_mem * max_connections (worst case)
maintenance_work_mem = 256MB             # VACUUM, CREATE INDEX, ALTER TABLE

# ---------------------------------------------------------
# WAL (Write-Ahead Log)
# ---------------------------------------------------------
wal_buffers = 64MB                       # буфер WAL в shared memory
checkpoint_completion_target = 0.9       # размазываем checkpoint по времени
checkpoint_timeout = 10min               # максимальный интервал между checkpoint
min_wal_size = 1GB
max_wal_size = 4GB

# ---------------------------------------------------------
# Планировщик запросов
# ---------------------------------------------------------
random_page_cost = 1.1                   # SSD: низкая стоимость random I/O (по умолчанию 4.0)
effective_io_concurrency = 200           # количество параллельных I/O запросов (SSD)
default_statistics_target = 200          # точность статистики для планировщика (по умолчанию 100)

# ---------------------------------------------------------
# Параллелизм
# ---------------------------------------------------------
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ---------------------------------------------------------
# Логирование медленных запросов
# ---------------------------------------------------------
log_min_duration_statement = 500         # логировать запросы дольше 500ms
log_checkpoints = on                     # логировать checkpoint события
log_lock_waits = on                      # логировать ожидания блокировок
log_temp_files = 0                       # логировать все временные файлы

# Формат лога
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'

# ---------------------------------------------------------
# Autovacuum (агрессивнее для горячих таблиц)
# ---------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4               # параллельные воркеры VACUUM
autovacuum_naptime = 30s                 # пауза между проходами autovacuum
autovacuum_vacuum_scale_factor = 0.05    # VACUUM при 5% изменений (вместо 20%)
autovacuum_analyze_scale_factor = 0.02   # ANALYZE при 2% изменений (вместо 10%)
autovacuum_vacuum_cost_delay = 2ms       # снижаем паузы для более быстрого VACUUM

# ---------------------------------------------------------
# Локаль и кодировка
# ---------------------------------------------------------
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
datestyle = 'iso, mdy'
timezone = 'UTC'

# ---------------------------------------------------------
# Прочее
# ---------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'  # для анализа медленных запросов
pg_stat_statements.max = 10000
pg_stat_statements.track = all
